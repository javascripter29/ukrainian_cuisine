services:
  postgres:
    image: postgres:16
    container_name: ukrainian_cuisine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 219251
      POSTGRES_DB: ukrainian_cuisine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
